name: CI Offline Required

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  offline-local-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install offline test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/ci/requirements-offline.txt
          pip install git+https://github.com/lematerial/material-hasher.git
          pip install git+https://github.com/KellerJordan/Muon
          pip install -e .

      - name: Run required offline local suite
        run: python -m tests.local.runner --cpu --offline