name: CI Optional CPU Secrets

"on":
  workflow_dispatch:

jobs:
  local-secrets-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_KEY: ${{ secrets.HF_KEY }}
      WANDB_KEY: ${{ secrets.WANDB_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/ci/requirements-offline.txt
          pip install git+https://github.com/lematerial/material-hasher.git
          pip install git+https://github.com/KellerJordan/Muon
          pip install -e .

      - name: Run local suite with secret-dependent checks
        if: ${{ env.HF_KEY != '' && env.WANDB_KEY != '' }}
        env:
          HF_KEY: ${{ env.HF_KEY }}
          WANDB_KEY: ${{ env.WANDB_KEY }}
        run: python -m tests.local.runner --cpu --secrets

      - name: Fallback to offline suite when secrets are missing
        if: ${{ env.HF_KEY == '' || env.WANDB_KEY == '' }}
        run: |
          echo "HF_KEY or WANDB_KEY is missing; running offline tier instead."
          python -m tests.local.runner --cpu --offline
